[output]
full_body = true

[[requests]]
name = "login patient"
method = "POST"
url = "{{env.base_url}}/api/v1/auth/login"
body = """
{
  "username": "{{env.patient_username}}",
  "password": "{{env.patient_password}}"
}
"""

[requests.save]
patientToken = "body.data.accessToken"
patientRefreshToken = "body.data.refreshToken"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.accessToken"
op = "exists"

[[requests]]
name = "create registration for encounter"
method = "POST"
url = "{{env.base_url}}/api/v1/registrations"
depends_on = ["login patient"]
body = """
{
  "clinicSessionId": {{env.clinic_session_id}},
  "clinicSlotId": {{env.clinic_slot_id}}
}
"""

[requests.headers]
Authorization = "Bearer {{run.patientToken}}"

[requests.save]
registrationId = "body.data.registrationId"
orderNo = "body.data.orderNo"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.registrationId"
op = "exists"

[[requests.assert]]
left = "body.data.orderNo"
op = "exists"

[[requests]]
name = "login doctor"
method = "POST"
url = "{{env.base_url}}/api/v1/auth/login"
depends_on = ["create registration for encounter"]
body = """
{
  "username": "{{env.doctor_username}}",
  "password": "{{env.doctor_password}}"
}
"""

[requests.save]
doctorToken = "body.data.accessToken"
doctorRefreshToken = "body.data.refreshToken"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.accessToken"
op = "exists"

[[requests]]
name = "doctor list scheduled encounters"
method = "GET"
url = "{{env.base_url}}/api/v1/encounters?status=SCHEDULED"
depends_on = ["login doctor"]

[requests.headers]
Authorization = "Bearer {{run.doctorToken}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.items[*].registrationId"
op = "contains"
right = "{{run.registrationId}}"

[[requests.assert]]
left = "body.data.items[*].patientUserId"
op = "contains"
right = "{{env.patient_user_id}}"

[[requests.assert]]
left = "body.data.items[*].patientName"
op = "contains"
right = "{{env.patient_name}}"

[[requests.assert]]
left = "body.data.items[*].departmentId"
op = "contains"
right = "{{env.department_id}}"

[[requests.assert]]
left = "body.data.items[*].departmentName"
op = "contains"
right = "{{env.department_name}}"

[[requests.assert]]
left = "body.data.items[*].sessionDate"
op = "contains"
right = "{{env.session_date}}"

[[requests.assert]]
left = "body.data.items[*].periodCode"
op = "contains"
right = "MORNING"

[[requests.assert]]
left = "body.data.items[*].encounterStatus"
op = "contains"
right = "SCHEDULED"

[[requests]]
name = "doctor list all encounters without status"
method = "GET"
url = "{{env.base_url}}/api/v1/encounters"
depends_on = ["login doctor"]

[requests.headers]
Authorization = "Bearer {{run.doctorToken}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.items[*].registrationId"
op = "contains"
right = "{{run.registrationId}}"

[[requests.assert]]
left = "body.data.items[*].patientUserId"
op = "contains"
right = "{{env.patient_user_id}}"

[[requests]]
name = "patient list encounters forbidden"
method = "GET"
url = "{{env.base_url}}/api/v1/encounters?status=SCHEDULED"
depends_on = ["login patient"]

[requests.headers]
Authorization = "Bearer {{run.patientToken}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 403

[[requests.assert]]
left = "body.code"
op = "eq"
right = 2008

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests]]
name = "doctor list encounters invalid status"
method = "GET"
url = "{{env.base_url}}/api/v1/encounters?status=WAITING"
depends_on = ["login doctor"]

[requests.headers]
Authorization = "Bearer {{run.doctorToken}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 400

[[requests.assert]]
left = "body.code"
op = "eq"
right = 1002

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests]]
name = "logout doctor"
method = "POST"
url = "{{env.base_url}}/api/v1/auth/logout"
depends_on = [
  "login doctor",
  "doctor list scheduled encounters",
  "doctor list all encounters without status",
  "doctor list encounters invalid status"
]
body = """
{
  "refreshToken": "{{run.doctorRefreshToken}}"
}
"""

[requests.headers]
Authorization = "Bearer {{run.doctorToken}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests]]
name = "logout patient"
method = "POST"
url = "{{env.base_url}}/api/v1/auth/logout"
depends_on = [
  "login patient",
  "create registration for encounter",
  "patient list encounters forbidden"
]
body = """
{
  "refreshToken": "{{run.patientRefreshToken}}"
}
"""

[requests.headers]
Authorization = "Bearer {{run.patientToken}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0
