[output]
full_body = true

[[requests]]
name = "login"
method = "POST"
url = "{{env.base_url}}/api/v1/auth/login"
body = """
{
  "username": "{{env.username}}",
  "password": "{{env.password}}"
}
"""

[requests.save]
token = "body.data.accessToken"
refreshToken = "body.data.refreshToken"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.data.accessToken"
op = "exists"

[[requests]]
name = "list clinic sessions"
method = "GET"
url = "{{env.base_url}}/api/v1/clinic-sessions"
depends_on = ["login"]

[requests.headers]
Authorization = "Bearer {{run.token}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.items"
op = "exists"

[[requests]]
name = "list clinic sessions with filters"
method = "GET"
url = "{{env.base_url}}/api/v1/clinic-sessions?departmentId=1&dateFrom=2026-01-01&dateTo=2026-12-31"
depends_on = ["login"]

[requests.headers]
Authorization = "Bearer {{run.token}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0

[[requests.assert]]
left = "body.requestId"
op = "exists"

[[requests.assert]]
left = "body.data.items"
op = "exists"

[[requests]]
name = "logout"
method = "POST"
url = "{{env.base_url}}/api/v1/auth/logout"
depends_on = ["login", "list clinic sessions", "list clinic sessions with filters"]
body = """
{
  "refreshToken": "{{run.refreshToken}}"
}
"""

[requests.headers]
Authorization = "Bearer {{run.token}}"

[[requests.assert]]
left = "status"
op = "eq"
right = 200

[[requests.assert]]
left = "body.code"
op = "eq"
right = 0
