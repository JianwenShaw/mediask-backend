services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: mediask-postgres:17.9-bookworm-pgvector
    container_name: mediask-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: mediask_dev
      POSTGRES_USER: mediask
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    command:
      [
        "postgres",
        "-c",
        "timezone=Asia/Shanghai",
        "-c",
        "log_timezone=Asia/Shanghai"
      ]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Keep a single init entrypoint at the top level; docs/sql is the authoritative SQL source.
      - ./docker/postgres/initdb/00-init-dev.sql:/docker-entrypoint-initdb.d/00-init-dev.sql:ro
      - ./docs/sql:/mediask-init/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediask -d mediask_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.8-alpine
    container_name: mediask-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD is required}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec"
      ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
