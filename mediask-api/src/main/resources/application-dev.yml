spring:
  datasource:
    url: jdbc:postgresql://${MEDIASK_DEV_MIDWARE_HOST}:5432/mediask_dev
    username: mediask
    password: ${PG_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 10000
      leak-detection-threshold: 30000
  data:
    redis:
      host: ${MEDIASK_DEV_MIDWARE_HOST}
      port: 16379
      password: ${REDIS_PASSWORD}

mediask:
  ai:
    service:
      base-url: ${MEDIASK_AI_BASE_URL:http://localhost:8000}
      api-key: ${MEDIASK_AI_API_KEY:dev-api-key}
    knowledge-storage:
      mode: LOCAL
      local:
        base-dir: ${MEDIASK_AI_KNOWLEDGE_STORAGE_LOCAL_BASE_DIR:${user.dir}/var/knowledge-storage}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:5174
  redisson:
    address: redis://${MEDIASK_DEV_MIDWARE_HOST}:${REDIS_PORT:16379}
    password: ${REDIS_PASSWORD}
  security:
    public-docs-enabled: true
